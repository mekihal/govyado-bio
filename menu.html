            </div>
        </div>
    </main>

    <!-- Floating Cart Button -->
    <button class="floating-cart" id="floating-cart" style="display: none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span>Корзина</span>
        <span class="floating-cart__count" id="cart-count">0</span>
    </button>

    <!-- Cart Backdrop -->
    <div class="cart-backdrop" id="cart-backdrop"></div>

    <!-- Cart Drawer -->
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-drawer__header">
            <h3>Ваш заказ</h3>

            </button>
        </div>
        <div class="cart-drawer__content" id="cart-items-container">
            <!-- Список выбранных блюд -->

        <div class="cart-drawer__footer">
            <div class="cart-drawer__total">
                <span>Итого к оплате:</span>

            </div>
            <button class="checkout-btn" id="checkout-btn">
                <span>Оформить заказ в WhatsApp</span>
            </button>
        </div>
    </div>

        // Инициализация корзины
        let cart = JSON.parse(localStorage.getItem('govyado_cart')) || [];

        function renderMenu(categoryFilter = 'all') {
            const grid = document.getElementById('menu-grid');
            if (!grid) return;
            grid.innerHTML = '';

            const filtered = categoryFilter === 'all' 
                ? menuTable 
                : menuTable.filter(item => item.category === categoryFilter);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-card';

                let selectedVarIndex = 0;
                let currentPrice = item.price ? item.price : item.variations[selectedVarIndex].price;

                let variationsHtml = '';
                if (item.variations && item.variations.length > 0) {
                    variationsHtml = `<div class="card-variations">`;
                    item.variations.forEach((v, index) => {
                        const activeClass = index === selectedVarIndex ? 'variation-btn--active' : '';
                        variationsHtml += `<button class="variation-btn ${activeClass}" data-index="${index}">${v.name}</button>`;
                    });
                    variationsHtml += `</div>`;
                } else {
                    // Костыль для ровного распределения контента в карточках без вариаций
                    variationsHtml = `<div style="height: 48px;"></div>`;
                }

                card.innerHTML = `
                    <div class="menu-card__img-wrapper">
                        <img src="${item.image}" alt="${item.title}" class="menu-card__img" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=400&q=80'">
                    </div>
                    <div class="menu-card__content">
                        <h3 class="menu-card__title">${item.title}</h3>
                        <p class="menu-card__desc">${item.description}</p>
                        ${variationsHtml}
                    </div>
                    <div class="menu-card__footer">
                        <div class="menu-card__price"><span class="price-val">${currentPrice}</span> ₽</div>
                        <button class="add-to-cart-btn">В корзину</button>
                    </div>
                `;

                // Обработчик выбора вариаций
                const varBtns = card.querySelectorAll('.variation-btn');
                varBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        varBtns.forEach(b => b.classList.remove('variation-btn--active'));
                        btn.classList.add('variation-btn--active');
                        const index = parseInt(btn.getAttribute('data-index'));
                        selectedVarIndex = index;
                        const newPrice = item.variations[index].price;
                        card.querySelector('.price-val').textContent = newPrice;
                    });
                });

                // Обработчик кнопки добавления в корзину
                card.querySelector('.add-to-cart-btn').addEventListener('click', () => {
                    const finalPrice = item.variations ? item.variations[selectedVarIndex].price : item.price;
                    const finalVariation = item.variations ? item.variations[selectedVarIndex].name : null;
                    addToCart(item.id, item.title, finalVariation, finalPrice, item.image);
                });

                grid.appendChild(card);
            });
        }

        // Логика работы с корзиной
        function saveCart() {
            localStorage.setItem('govyado_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function addToCart(id, title, variation, price, image) {
            const existing = cart.find(item => item.id === id && item.variation === variation);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ id, title, variation, price, image, quantity: 1 });
            }
            saveCart();
            openCart();
        }

        function removeFromCart(id, variation) {
            cart = cart.filter(item => !(item.id === id && item.variation === variation));
            saveCart();
        }

        function changeQuantity(id, variation, delta) {
            const item = cart.find(item => item.id === id && item.variation === variation);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id, variation);
                    return;
                }
            }
            saveCart();
        }

        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            // Кнопка корзины на экране
            const cartBtn = document.getElementById('floating-cart');
            const cartCount = document.getElementById('cart-count');
            if (cartBtn && cartCount) {
                if (totalItems > 0) {
                    cartBtn.style.display = 'flex';
                    cartCount.textContent = totalItems;
                } else {
                    cartBtn.style.display = 'none';
                }
            }

            // Рендер элементов в боковом меню корзины
            const container = document.getElementById('cart-items-container');
            const totalVal = document.getElementById('cart-total');
            if (container && totalVal) {
                totalVal.textContent = totalPrice;
                container.innerHTML = '';

                if (cart.length === 0) {
                    container.innerHTML = `
                        <div class="cart-empty">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                            <p>В корзине пока пусто</p>
                        </div>
                    `;
                    return;
                }

                cart.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'cart-item';
                    const varText = item.variation ? `<span class="cart-item__variation">${item.variation}</span>` : '';

                    itemEl.innerHTML = `
                        <img src="${item.image}" alt="${item.title}" class="cart-item__img" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=100&q=80'">
                        <div class="cart-item__info">
                            <h4 class="cart-item__title">${item.title}</h4>
                            ${varText}
                            <div class="cart-item__price">${item.price} ₽</div>
                        </div>
                        <div class="cart-item__actions">
                            <div class="quantity-selector">
                                <button class="quantity-btn minus-btn">-</button>
                                <span class="quantity-val">${item.quantity}</span>
                                <button class="quantity-btn plus-btn">+</button>
                            </div>
                        </div>
                    `;

                    itemEl.querySelector('.minus-btn').addEventListener('click', () => changeQuantity(item.id, item.variation, -1));
                    itemEl.querySelector('.plus-btn').addEventListener('click', () => changeQuantity(item.id, item.variation, 1));

                    container.appendChild(itemEl);
                });
            }
        }

        // Открытие/Закрытие корзины
        const cartDrawer = document.getElementById('cart-drawer');
        const cartBackdrop = document.getElementById('cart-backdrop');

        function openCart() {
            if (cartDrawer && cartBackdrop) {
                cartDrawer.classList.add('cart-drawer--open');
                cartBackdrop.classList.add('cart-backdrop--open');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeCart() {
            if (cartDrawer && cartBackdrop) {
                cartDrawer.classList.remove('cart-drawer--open');
                cartBackdrop.classList.remove('cart-backdrop--open');
                document.body.style.overflow = '';
            }
        }

        document.getElementById('floating-cart')?.addEventListener('click', openCart);
        document.getElementById('cart-close')?.addEventListener('click', closeCart);
        document.getElementById('cart-backdrop')?.addEventListener('click', closeCart);

        // Отправка заказа в WhatsApp
        document.getElementById('checkout-btn')?.addEventListener('click', () => {
            if (cart.length === 0) return;

            let message = 'Здравствуйте! Хочу сделать заказ в Говядо:\n\n';
            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                const varText = item.variation ? ` (${item.variation})` : '';
                message += `${index + 1}. ${item.title}${varText} — ${item.quantity} шт. х ${item.price} ₽ = ${itemTotal} ₽\n`;
            });

            message += `\n*Итого к оплате: ${total} ₽*`;

            const encoded = encodeURIComponent(message);
            window.open(`https://wa.me/79935955147?text=${encoded}`, '_blank');
        });

        // Настройка фильтрации категорий
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('category-btn--active'));
                btn.classList.add('category-btn--active');
                const category = btn.getAttribute('data-category');
                renderMenu(category);
            });
        });

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            renderMenu('all');
            updateCartUI();
        });
    </script>
</body>
</html>
