<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Меню - Говядо</title>
    <meta name="description" content="Меню">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body class="page-menu">

    <!-- Шапка -->
    <header class="header">
        <div class="nav__backdrop"></div>
        <div class="header__inner">
            <a href="./" class="logo">
                <img src="assets/images/logo-white.svg" alt="Говядо" class="logo__img">
            </a>
            <nav class="nav">
                <a href="./" class="nav__link">Главное</a>
                <a href="menu" class="nav__link nav__link--active">Меню</a>
                <a href="./#gallery" class="nav__link">Галерея</a>
                <a href="./#contacts" class="nav__link">Контакты</a>
            </nav>
            <button class="nav__toggle" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Категории -->
    <div class="menu-categories">
        <div class="menu-categories__inner">
            <button class="category-btn category-btn--active" data-category="all">Все блюда</button>
            <button class="category-btn" data-category="shawarma">Шаурма</button>
            <button class="category-btn" data-category="grill">Шашлык и Гриль</button>
            <button class="category-btn" data-category="snacks">Закуски</button>
            <button class="category-btn" data-category="drinks">Напитки</button>
        </div>
    </div>

    <!-- Секция карточек -->
    <main class="menu-section">
        <div class="container">
            <div class="menu-grid" id="menu-grid">
                <!-- Сами карточки будут добавлены динамически -->
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="footer">
        <div class="container">
            <div class="footer__inner">
                <a href="#" class="logo">
                    <img src="assets/images/logo-white.svg" alt="Говядо" class="logo__img">
                </a>
                <nav class="footer__nav">
                    <a href="./#hero">Главное</a>
                    <a href="menu">Меню</a>
                    <a href="./#gallery">Галерея</a>
                    <a href="./#contacts">Контакты</a>
                </nav>
                <p class="footer__copy">Говядо. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
